[build]
  command = "npm ci --legacy-peer-deps --platform=linux --arch=x64 && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  external_node_modules = ["twilio", "@supabase/supabase-js"]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NEXT_USE_NETLIFY_EDGE = "true"
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps --platform=linux --arch=x64"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

